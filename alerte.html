<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertes – Centre IRM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=final">

<style>
.alert-grid { display: grid; gap: 20px; }
.alert-card { border-left: 5px solid #f97316; }
.alert-item { padding: 14px 0; border-bottom: 1px solid #e2e8f0; }
.alert-item:last-child { border-bottom: none; }
.alert-label { font-weight: 700; }
.alert-range { color: #64748b; margin-top: 4px; }

.alert-enabled {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: #ecfdf5;
    color: #166534;
    font-size: 0.85rem;
    font-weight: 700;
}

.alert-disabled {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: #fef2f2;
    color: #991b1b;
    font-size: 0.85rem;
    font-weight: 700;
}

.error-box {
    color: #991b1b;
    background: #fef2f2;
    border: 1px solid #fecaca;
    padding: 20px;
    border-radius: 12px;
}
</style>
</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">☰</button>
<div id="overlay" onclick="closeMenu()"></div>

<div class="app-shell">

<aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
        <span>IRM Supervision</span>
        <img src="Logo_IRM.png">
    </div>

    <div class="sidebar-section">
        <div class="sidebar-title">Monitoring</div>
        <nav class="sidebar-menu">
            <a href="index.html"><span class="dot"></span>Vue générale</a>
            <a href="atmosphere.html"><span class="dot"></span>Atmosphère</a>
            <a href="eaufroide.html"><span class="dot"></span>Eau glacée</a>
            <a href="compresseur.html"><span class="dot"></span>Compresseur</a>
            <a href="groupefroid.html"><span class="dot"></span>Groupe froid</a>
        </nav>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-title">Système</div>
        <nav class="sidebar-menu">
            <a href="alerte.html" class="active"><span class="dot"></span>Alertes</a>
            <a href="datalogging.html" data-page="datalogging"><span class="dot"></span><span class="label-text">Datalogging</span></a>
        </nav>
    </div>
</aside>

<main class="main-content">

<div class="topbar">
    <div>
        <h1 class="page-title">Alertes</h1>
        <div class="page-subtitle">Seuils de supervision</div>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Configuration des seuils</h2>
        <div id="alertes_content">Chargement...</div>
    </div>
</div>

</main>
</div>

<script>
const CONFIG_SEUILS_PATH = "config_seuils.json";

async function loadSeuils() {
    const container = document.getElementById("alertes_content");

    try {
        const response = await fetch(CONFIG_SEUILS_PATH + "?v=" + Date.now());

        if (!response.ok) throw new Error("HTTP " + response.status);

        const seuils = await response.json();
        container.innerHTML = renderSeuils(seuils);

    } catch (e) {
        console.error(e);
        container.innerHTML = `<div class="error-box">Erreur chargement JSON</div>`;
    }
}

function renderRange(cfg) {
    if (cfg.unit === "state") {
        const expected = cfg.expected ?? 1;
        const bad = expected === 1 ? 0 : 1;

        return `
            Valeur attendue : ${expected}<br>
            Alerte si valeur = ${bad}
        `;
    }

    return `
        Min : ${cfg.min ?? "--"} ${cfg.unit || ""} 
        | 
        Max : ${cfg.max ?? "--"} ${cfg.unit || ""}
    `;
}

function renderSeuils(seuils) {
    let html = `<div class="alert-grid">`;

    for (const device in seuils) {
        html += `<div class="card alert-card"><h2>${device}</h2>`;

        for (const key in seuils[device]) {
            const cfg = seuils[device][key];

            html += `
                <div class="alert-item">
                    <div class="alert-label">${cfg.label || key}</div>
                    <div class="alert-range">${renderRange(cfg)}</div>
                    <div class="${cfg.enabled ? "alert-enabled" : "alert-disabled"}">
                        ${cfg.enabled ? "Activée" : "Désactivée"}
                    </div>
                </div>
            `;
        }

        html += `</div>`;
    }

    html += `</div>`;
    return html;
}

function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}

function closeMenu() {
    document.getElementById("sidebar").classList.remove("active");
}

loadSeuils();
</script>

</body>
</html>
